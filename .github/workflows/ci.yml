name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Quality (Lint & Format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AstraPortal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: AstraPortal/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm exec eslint . --max-warnings 0

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AstraPortal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AstraPortal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: AstraPortal/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: AstraPortal/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('AstraPortal/pnpm-lock.yaml') }}-${{ hashFiles('AstraPortal/**/*.ts', 'AstraPortal/**/*.tsx', 'AstraPortal/next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('AstraPortal/pnpm-lock.yaml') }}-
      - run: pnpm exec next build
